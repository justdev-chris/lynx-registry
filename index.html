<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱 Lynx Registry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0d0d0d;
            color: #e0e0e0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 30px 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 4px;
        }
        h1 span {
            color: #00ccff;
        }
        .sub {
            color: #888;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .search-box input {
            flex: 1;
            padding: 10px 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-box input:focus {
            border-color: #00ccff;
        }
        .search-box button {
            padding: 10px 24px;
            background: #00ccff;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-box button:hover {
            background: #00ddff;
        }
        .package-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .package-item {
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.15s;
            cursor: default;
        }
        .package-item:hover {
            border-color: #00ccff;
            background: #1a1a1a;
        }
        .package-name {
            font-weight: 600;
            color: #fff;
            font-size: 16px;
        }
        .package-name span {
            color: #888;
            font-weight: 400;
            font-size: 13px;
            margin-left: 8px;
        }
        .package-desc {
            color: #aaa;
            font-size: 14px;
            flex: 1;
            margin: 0 16px;
        }
        .package-version {
            color: #666;
            font-size: 13px;
            background: #1f1f1f;
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid #2a2a2a;
        }
        .install-cmd {
            background: #0d0d0d;
            padding: 2px 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #00ccff;
            font-family: monospace;
            cursor: pointer;
            border: 1px solid #2a2a2a;
            transition: 0.15s;
            margin-left: 12px;
        }
        .install-cmd:hover {
            background: #1a1a1a;
            border-color: #00ccff;
        }
        .status {
            margin-top: 20px;
            color: #666;
            font-size: 14px;
            text-align: center;
        }
        .status a {
            color: #00ccff;
            text-decoration: none;
        }
        .status a:hover {
            text-decoration: underline;
        }
        .empty {
            color: #555;
            text-align: center;
            padding: 40px 0;
        }
        @media (max-width: 600px) {
            .package-item {
                flex-wrap: wrap;
                gap: 8px;
            }
            .package-desc {
                margin: 0;
                width: 100%;
                order: 3;
            }
            .install-cmd {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Lynx <span>Registry</span></h1>
        <div class="sub">Browse and discover Lynx packages</div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search packages..." oninput="filterPackages()">
            <button onclick="filterPackages()">Search</button>
        </div>

        <div id="packageList" class="package-list">
            <div class="empty">Loading packages...</div>
        </div>

        <div class="status">
            <span id="packageCount"></span> &bull; 
            <a href="https://github.com/justdev-chris/lynx-registry" target="_blank">GitHub</a> &bull;
            <a href="https://github.com/justdev-chris/lynx-registry#readme" target="_blank">Docs</a>
        </div>
    </div>

    <script>
        let packages = [];

        async function loadRegistry() {
            try {
                const res = await fetch('packages.json?t=' + Date.now());
                if (!res.ok) throw new Error('Failed to fetch');
                const data = await res.json();
                packages = Object.entries(data.packages || {}).map(([name, info]) => ({
                    name,
                    description: info.description || '',
                    version: info.latest || info.versions?.[0] || '0.1.0'
                }));
                renderPackages(packages);
            } catch (e) {
                document.getElementById('packageList').innerHTML = `<div class="empty">⚠️ Could not load registry. Try again later.</div>`;
                console.error(e);
            }
        }

        function renderPackages(list) {
            const container = document.getElementById('packageList');
            const count = document.getElementById('packageCount');

            if (list.length === 0) {
                container.innerHTML = `<div class="empty">No packages found.</div>`;
                count.textContent = '0 packages';
                return;
            }

            container.innerHTML = list.map(pkg => `
                <div class="package-item">
                    <span class="package-name">${pkg.name} <span>v${pkg.version}</span></span>
                    <span class="package-desc">${pkg.description || 'No description'}</span>
                    <span class="package-version">${pkg.version}</span>
                    <span class="install-cmd" onclick="copyInstall('${pkg.name}')">📋 lynx add ${pkg.name}</span>
                </div>
            `).join('');

            count.textContent = `${list.length} package${list.length > 1 ? 's' : ''}`;
        }

        function filterPackages() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                renderPackages(packages);
                return;
            }
            const filtered = packages.filter(p =>
                p.name.toLowerCase().includes(query) ||
                (p.description && p.description.toLowerCase().includes(query))
            );
            renderPackages(filtered);
        }

        function copyInstall(name) {
            const cmd = `lynx add ${name}`;
            navigator.clipboard?.writeText(cmd).then(() => {
                const btn = event.target;
                const orig = btn.textContent;
                btn.textContent = '✅ Copied!';
                setTimeout(() => btn.textContent = orig, 1500);
            }).catch(() => {
                prompt('Copy this command:', cmd);
            });
        }

        loadRegistry();
    </script>
</body>
</html>
